appId: com.ennead.indesign-repather
productName: InDesign Repather
directories:
  output: release
files:
  - dist/**/*
  - "!node_modules/.cache/**"
  - "!docs/**"
forceCodeSigning: false
win:
  target: nsis
  icon: assets/icon.png
  signAndEditExecutable: false
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
asar: true
publish:
  provider: github
